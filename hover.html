<!DOCTYPE html>
<html>
<head>
  <title>practicing</title>
  <style>
   .subscribe {
    background-color: rgb(212, 30, 30);
    height: 36px;
    width: 106px;
    color: white;
    border-width: 0px;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opactiy 0.15s;
   }
   .subscribe:hover {
    opacity: 0.8;
   }
   .subscribe:active {
    opacity: 0.5;
    transition: 0.25s;
   }
  </style>
  <style>
    .join {
   background-color: white;
   border-radius: 2px;
   border-width: 1px;
   height: 36px;
   width: 65px;
   margin-left: 8px;
   font-size: 13px;
   color: rgb(92, 92, 161);
   border-color: rgb(176, 176, 240);
   cursor: pointer;
   transition: background-color 0.15s, color 0.8s;
    }
    .join:hover {
    background-color: rgb(123, 123, 199);
    color: white;
    }
    .join:active {
      background-color: rgb(178, 178, 211);
    }
  </style>
  <style>
    .tweet {
      background-color: rgb(137, 137, 233);
      height: 36px;
      border-radius: 45px;
      width: 75px;
      color: white;
      border-width: 0px;
      margin-left: 8px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .tweet:hover {
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
<button class="subscribe">SUBSCRIBE</button>
<button class="join">JOIN</button>
<button class="tweet">Tweet</button>
</body>
</html>
