<!DOCTYPE html>
<html>
  <head>
    <title>creating youtube button</title>
    <style>
      .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        padding-left: 16px;
        padding-right: 16px;
        padding-top: 9px;
        padding-bottom: 9px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;
        vertical-align: middle;
      }
      .subscribe-button:hover {
        opacity: 0.8;
      }
      .subscribe-button:active {
        opacity: 0.5;
      }
      .join-button {
        background-color: white;
        border-color: rgb(41, 118, 211);
        border-style: solid;
        border-width: 1px;
        color: rgb(41, 118, 211);
        padding-left: 16px;
        padding-right: 16px;
        padding-top: 8px;
        padding-bottom: 8px;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 8px;
        transition: background-color 0.15s, color 1s;
        vertical-align: middle;
      }
      .join-button:hover {
        background-color: rgb(41, 118, 211);
        color: white;
      }
        .join-button:active {
          opacity: 0.7;
        }
      .Tweet-button {
        color: white;
        background-color: rgb(204, 0, 255);
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-right: 10px;
        padding-left: 10px;
        border-radius: 18px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: box-shadow 0.15s;
        vertical-align: middle;
      }
         .Tweet-button:hover {
         box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.11);
         }
    </style>
  </head>
  <body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="Tweet-button">Tweet</button>
  </body>
</html>
