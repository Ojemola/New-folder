<!DOCTYPE html>
<html>
  <head>
    <title>buttons.html</title>
    <style>
      .subscribe {
        background-color: red;
        height: 36px;
        border-radius: 2px;
        border: none;
        color: white;
        width: 105px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
      <style>
      .join {
        background-color: white;
        color: rgba(72, 72, 168, 0.644);
        border-width: 1px;
        height: 36px;
        margin-left: 8px;
        width: 62px;
        border-radius: 2px;
        font-size: 13px;
        border-color: rgb(164, 164, 238);
        cursor: pointer;
      }
      </style>
      <style>
      .tweet {
        background-color: rgb(102, 102, 212);
        height: 36px;
        border-radius: 48px;
        margin-left: 8px;
        width: 75px;
        color: white;
        font-size: 15px;
        border-width: 0px;
        font-weight: bold;
        cursor: pointer;
      }
      </style>
    </style>
  </head>
  <body>
    <button class="subscribe">SUBSCRIBE</button>
    <button class="join">JOIN</button>
    <button class="tweet">Tweet</button>
  </body>
</html>
