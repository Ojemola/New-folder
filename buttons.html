<!DOCTYPE html>
<html>
  <head>
    <title>buttons.html</title>
    <body>
      <button class="subscribe">SUBSCRIBE</button>
      <style>
        .subscribe {
          background-color: rgb(194, 27, 27);
         color: white;
         height: 36px;
         width: 92px;
         font-size: 14px;
         border: none;
         border-radius: 2px;
         text-align: left;
          cursor: pointer;
        }
      </style>
      <button class="join">JOIN</button>
         <style>
          .join {
          background-color: white;
          color: rgba(72, 72, 168, 0.644);
          border-width: 1px;
          height: 36px;
          margin-left: 8px;
          width: 62px;
          border-radius: 2px;
          font-size: 13px;
          border-color: rgb(164, 164, 238);
          cursor: pointer;
          }
         </style>
         <button class="tweet">Tweet</button>
         <style>
          .tweet {
            background-color: rgb(161, 161, 247);
            height: 36px;
            border-radius: 48px;
            margin-left: 8px;
            width: 75px;
            color: white;
            font-size: 14px;
            border-width: 0px;
            font-weight: bold;
            cursor: pointer;
          }
         </style>
    </body>
  </head>
</html>
